<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student List</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2em;
      }
      #section-selector button {
        margin-right: 10px;
        padding: 10px;
        cursor: pointer;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 20px;
        align-items: flex-end;
      }
      .control-group {
        display: flex;
        flex-direction: column;
      }
      label {
        font-weight: bold;
        margin-bottom: 5px;
      }
      #section-dropdown,
      #search-input {
        padding: 8px;
        font-size: 1em;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        max-width: 500px;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
      #whatsapp-share {
        display: none; /* Hidden by default */
        margin-top: 20px;
        padding: 10px 15px;
        background-color: #25d366;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
      }
      footer {
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid #ddd;
        text-align: center;
        color: #555;
      }
      footer a {
        color: #007bff;
        text-decoration: none;
      }
      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>Student Lists by Section</h1>

    <div class="controls">
      <div class="control-group">
        <label for="section-dropdown">Select Section:</label>
        <select id="section-dropdown">
          <option value="">--Please choose a section--</option>
        </select>
      </div>
      <div class="control-group">
        <label for="search-input">Search in Section:</label>
        <input
          type="text"
          id="search-input"
          placeholder="Search by name or SRN..."
        />
      </div>
    </div>

    <h2 id="current-section"></h2>
    <table id="student-table">
      <thead>
        <tr>
          <th>
            <input
              type="checkbox"
              id="select-all-checkbox"
              title="Select All"
            />
          </th>
          <th>SRN</th>
          <th>Name</th>
        </tr>
      </thead>
      <tbody id="student-list">
        <!-- Student rows will be generated by JavaScript -->
      </tbody>
    </table>

    <a id="whatsapp-share" href="#" target="_blank">Share on WhatsApp</a>

    <script src="script.js"></script>

    <footer>
      Created by
      <a
        href="https://www.linkedin.com/in/sudeep-sajjan/"
        target="_blank"
        rel="noopener noreferrer"
        >Sudeep Sajjan</a
      >
    </footer>
  </body>
</html>
